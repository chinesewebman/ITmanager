# Network Monitor Platform - 配置文件
# 环境: development / production

server:
  host: "0.0.0.0"
  port: 8080
  mode: "debug"  # debug / release

database:
  host: "localhost"
  port: 5432
  user: "nmp"
  password: "nmp123"
  name: "network_monitor"
  sslmode: "disable"

redis:
  host: "localhost"
  port: 6379
  password: ""
  db: 0

# 第三方系统集成
integrations:
  netbox:
    url: "http://localhost:8000"
    token: "your-netbox-api-token"

  zabbix:
    url: "http://localhost:8080"
    user: "Admin"
    password: "zabbix"

  glpi:
    url: "http://localhost"
    app_token: "your-glpi-app-token"
    user_token: "your-glpi-user-token"

# 认证
auth:
  jwt:
    secret: "your-jwt-secret-key-change-in-production"
    expire: 86400  # 24小时 (秒)
  ldap:
    enabled: false
    host: "ldap://localhost"
    port: 389
    base_dn: "dc=company,dc=com"
    bind_dn: "cn=admin,dc=company,dc=com"
    bind_password: ""

# 日志
log:
  level: "debug"  # debug / info / warn / error
  format: "json"  # json / text
  output: "stdout"  # stdout / file
  file:
    path: "./logs/app.log"
    max_size: 100  # MB
    max_backups: 7

# 告警通知
notifications:
  dingtalk:
    enabled: false
    webhook_url: ""
    secret: ""
  email:
    enabled: false
    smtp_host: ""
    smtp_port: 587
    smtp_user: ""
    smtp_password: ""
    from: "nmp@company.com"
