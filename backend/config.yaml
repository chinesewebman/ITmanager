server:
  host: 0.0.0.0
  port: 8080
  mode: debug
  # C-P5: 是否暴露 /metrics 端点（生产环境建议开启供 Prometheus 抓取）
  metrics_enabled: true

database:
  host: "localhost"
  port: 5432
  user: "nmp"
  # F1: 默认空值，由 NMP_DATABASE_PASSWORD 环境变量注入。CI/dev 用 .env.example
  password: ""
  name: "network_monitor"
  # F1: release 模式建议 require 或 verify-full
  sslmode: "disable"

redis:
  host: "localhost"
  port: 6379
  password: ""
  db: 0

# 第三方系统集成
# F1: 默认占位；生产环境必须通过 NMP_INTEGRATIONS_*_TOKEN 环境变量注入
integrations:
  netbox:
    url: "http://localhost:8000"
    token: ""

  zabbix:
    url: "http://localhost:8080"
    user: "Admin"
    password: "zabbix"

  glpi:
    url: "http://localhost"
    app_token: ""
    user_token: ""

# 认证
# F1+F3: auth.jwt.secret 启动时由 Validate() 校验长度 >= 32 且非占位
# 通过 NMP_AUTH_JWT_SECRET 注入 32+ 字符随机串：
#   openssl rand -hex 32
auth:
  jwt:
    secret: ""  # 必须从环境变量 NMP_AUTH_JWT_SECRET 注入
    expire: 86400  # 24小时 (秒)
  ldap:
    enabled: false
    url: "ldap://localhost:389"
    base_dn: "dc=company,dc=com"
    bind_user: ""
    bind_password: ""

# CORS
# F4: 允许的来源，逗号分隔。release 模式必填
allowed_origins:
  - "http://localhost:5173"
  - "http://localhost:3000"

# 通知
notifications:
  smtp:
    enabled: false
    smtp_host: "smtp.gmail.com"
    smtp_port: 587
    smtp_user: ""
    smtp_password: ""
    from: "noreply@company.com"

log:
  level: "info"  # debug / info / warn / error
  format: "json"  # json / text
