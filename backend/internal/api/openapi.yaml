openapi: 3.0.3
info:
  title: 网络运维监控平台 API
  description: |
    网络运维监控平台后端API规范，基于RESTful设计风格。

    ## 认证方式
    - 所有API需要通过Header传递API Key：`Authorization: Bearer <token>`
    - 登录接口返回token

    ## 响应格式
    所有接口统一响应格式：
    ```json
    {
      "code": 0,
      "message": "success",
      "data": {}
    }
    ```
  version: 1.0.0
  contact:
    name: IT Manager Team

servers:
  - url: http://localhost:8080/api
    description: 本地开发环境
  - url: http://localhost/api
    description: 生产环境

tags:
  - name: 认证
    description: 登录、登出相关接口
  - name: 仪表盘
    description: 统计和趋势数据
  - name: 资产管理
    description: 资产CRUD操作
  - name: 告警中心
    description: 告警列表、确认、解决
  - name: 机房机柜
    description: 机房、机柜管理
  - name: 工单管理
    description: 工单相关接口
  - name: 用户管理
    description: 用户列表、详情
  - name: 通知设置
    description: 通知渠道管理

paths:
  # ==================== 认证 ====================
  /auth/login:
    post:
      tags:
        - 认证
      summary: 用户登录
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                  description: 用户名
                password:
                  type: string
                  description: 密码
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'

  /auth/logout:
    post:
      tags:
        - 认证
      summary: 用户登出
      operationId: logout
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 登出成功

  # ==================== 仪表盘 ====================
  /dashboard/stats:
    get:
      tags:
        - 仪表盘
      summary: 获取仪表盘统计
      operationId: getDashboardStats
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardStats'

  /dashboard/trends:
    get:
      tags:
        - 仪表盘
      summary: 获取告警趋势
      operationId: getDashboardTrends
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardTrends'

  # ==================== 资产管理 ====================
  /assets:
    get:
      tags:
        - 资产管理
      summary: 获取资产列表
      operationId: listAssets
      parameters:
        - name: site_id
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetList'

    post:
      tags:
        - 资产管理
      summary: 创建资产
      operationId: createAsset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssetInput'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Asset'

  /assets/{id}:
    get:
      tags:
        - 资产管理
      summary: 获取资产详情
      operationId: getAsset
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Asset'

    put:
      tags:
        - 资产管理
      summary: 更新资产
      operationId: updateAsset
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssetInput'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Asset'

    delete:
      tags:
        - 资产管理
      summary: 删除资产
      operationId: deleteAsset
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 删除成功

  # ==================== 告警中心 ====================
  /alerts:
    get:
      tags:
        - 告警中心
      summary: 获取告警列表
      operationId: listAlerts
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [problem, acknowledged, resolved]
        - name: severity
          in: query
          schema:
            type: integer
        - name: host_id
          in: query
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertList'

  /alerts/{id}:
    get:
      tags:
        - 告警中心
      summary: 获取告警详情
      operationId: getAlert
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Alert'

  /alerts/{id}/acknowledge:
    put:
      tags:
        - 告警中心
      summary: 确认告警
      operationId: acknowledgeAlert
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 确认成功

  /alerts/{id}/resolve:
    put:
      tags:
        - 告警中心
      summary: 解决告警
      operationId: resolveAlert
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 解决成功

  /alerts/{id}/mark-fp:
    post:
      tags:
        - 告警中心
      summary: 标记/反标记告警为误报
      operationId: markFalsePositive
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [is_false_positive]
              properties:
                is_false_positive:
                  type: boolean
                  description: true=标记为误报，false=反标记
                note:
                  type: string
                  description: 误报备注（如"周期性抖动"）
      responses:
        '200':
          description: 操作成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Alert'
        '404':
          description: 告警不存在

  /alerts/false-positives/export:
    get:
      tags:
        - 告警中心
      summary: 导出误报训练集 CSV
      operationId: exportFalsePositives
      parameters:
        - name: since
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: 可选 RFC3339 时间，增量导出 marked_at >= since 的记录
      responses:
        '200':
          description: CSV 文件流
          content:
            text/csv:
              schema:
                type: string

  /alerts/stats:
    get:
      tags:
        - 告警中心
      summary: 获取告警统计
      operationId: getAlertStats
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertStats'

  # ==================== 告警规则 ====================
  /alert-rules:
    get:
      tags:
        - 告警中心
      summary: 获取告警规则列表
      operationId: listAlertRules
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertRuleList'

    post:
      tags:
        - 告警中心
      summary: 创建告警规则
      operationId: createAlertRule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlertRuleInput'
      responses:
        '201':
          description: 创建成功

  /alert-rules/{id}:
    put:
      tags:
        - 告警中心
      summary: 更新告警规则
      operationId: updateAlertRule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlertRuleInput'
      responses:
        '200':
          description: 更新成功

    delete:
      tags:
        - 告警中心
      summary: 删除告警规则
      operationId: deleteAlertRule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 删除成功

  # ==================== 机房 ====================
  /sites:
    get:
      tags:
        - 机房机柜
      summary: 获取机房列表
      operationId: listSites
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SiteList'

  /sites/{id}:
    get:
      tags:
        - 机房机柜
      summary: 获取机房详情
      operationId: getSite
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SiteDetail'

  # ==================== 机柜 ====================
  /racks:
    get:
      tags:
        - 机房机柜
      summary: 获取机柜列表
      operationId: listRacks
      parameters:
        - name: site_id
          in: query
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RackList'

  /racks/{id}:
    get:
      tags:
        - 机房机柜
      summary: 获取机柜详情
      operationId: getRack
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Rack'

  /racks/{id}/devices:
    get:
      tags:
        - 机房机柜
      summary: 获取机柜内设备
      operationId: getRackDevices
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RackDeviceList'

  # ==================== 工单 ====================
  /tickets:
    get:
      tags:
        - 工单管理
      summary: 获取工单列表
      operationId: listTickets
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: priority
          in: query
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketList'

    post:
      tags:
        - 工单管理
      summary: 创建工单
      operationId: createTicket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TicketInput'
      responses:
        '201':
          description: 创建成功

  /tickets/{id}:
    get:
      tags:
        - 工单管理
      summary: 获取工单详情
      operationId: getTicket
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ticket'

    put:
      tags:
        - 工单管理
      summary: 更新工单
      operationId: updateTicket
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TicketInput'
      responses:
        '200':
          description: 更新成功

  # ==================== 用户 ====================
  /users:
    get:
      tags:
        - 用户管理
      summary: 获取用户列表
      operationId: listUsers
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserList'

  /users/{id}:
    get:
      tags:
        - 用户管理
      summary: 获取用户详情
      operationId: getUser
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  # ==================== 通知渠道 ====================
  /notification/channels:
    get:
      tags:
        - 通知设置
      summary: 获取通知渠道列表
      operationId: listChannels
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelList'

    post:
      tags:
        - 通知设置
      summary: 创建通知渠道
      operationId: createChannel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChannelInput'
      responses:
        '201':
          description: 创建成功

  /notification/channels/{id}:
    put:
      tags:
        - 通知设置
      summary: 更新通知渠道
      operationId: updateChannel
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChannelInput'
      responses:
        '200':
          description: 更新成功

    delete:
      tags:
        - 通知设置
      summary: 删除通知渠道
      operationId: deleteChannel
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 删除成功

  /notification/channels/{id}/test:
    post:
      tags:
        - 通知设置
      summary: 测试通知渠道
      operationId: testChannel
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 测试消息已发送

  /diagnostics/assets/{id}/timeline:
    get:
      tags:
        - 资产诊断
      summary: 获取资产时间线（用于故障诊断）
      description: |
        聚合 alerts / tickets / assets / asset_networks 四张表，按时间倒序返回事件流。
        含 MTTR (平均恢复时间)、open_alerts、open_tickets 等摘要。
      operationId: getAssetTimeline
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: days
          in: query
          required: false
          schema:
            type: integer
            default: 30
            maximum: 365
          description: 查询窗口（天）默认 30，最大 365
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 200
            maximum: 1000
          description: 事件数上限，默认 200，最大 1000
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiagnosticTimeline'
        '400':
          description: 请求参数错误
        '404':
          description: 资产不存在

  /alert-suppressions:
    get:
      tags:
        - 告警抑制
      summary: 列出告警抑制规则
      operationId: listAlertSuppressions
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AlertSuppression'
    post:
      tags:
        - 告警抑制
      summary: 创建告警抑制规则
      operationId: createAlertSuppression
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlertSuppression'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertSuppression'
        '400':
          description: 参数错误

  /alert-suppressions/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags:
        - 告警抑制
      summary: 获取单条告警抑制规则
      operationId: getAlertSuppression
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertSuppression'
        '404':
          description: 不存在
    put:
      tags:
        - 告警抑制
      summary: 更新告警抑制规则
      operationId: updateAlertSuppression
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertSuppression'
        '400':
          description: 参数错误
    delete:
      tags:
        - 告警抑制
      summary: 删除告警抑制规则
      operationId: deleteAlertSuppression
      responses:
        '204':
          description: 删除成功

  /alert-suppressions/preview:
    post:
      tags:
        - 告警抑制
      summary: 模拟评估一条告警是否被抑制
      operationId: previewSuppression
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [severity, host_id, host_name]
              properties:
                severity:
                  type: integer
                  minimum: 1
                  maximum: 5
                host_id:
                  type: string
                  format: uuid
                host_name:
                  type: string
      responses:
        '200':
          description: 评估结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuppressionMatchResult'

  /topology:
    get:
      tags:
        - 网络拓扑
      summary: 获取网络拓扑图
      description: 聚合 assets + asset_networks + alerts，自动布局 (环形) + 虚拟节点标记
      operationId: getTopology
      parameters:
        - name: days
          in: query
          required: false
          schema:
            type: integer
            default: 30
            maximum: 365
        - name: only_with_alerts
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: asset_types
          in: query
          required: false
          schema:
            type: string
          description: 逗号分隔，如 "server,switch"
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopologyGraph'

  /oncall/current:
    get:
      tags:
        - 值班
      summary: 获取当前在班的 user
      operationId: getCurrentOncall
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OncallCurrent'

  /oncall/schedules:
    get:
      tags:
        - 值班
      summary: 列出值班组
      operationId: listOncallSchedules
      responses:
        '200':
          description: 成功
    post:
      tags:
        - 值班
      summary: 创建值班组
      operationId: createOncallSchedule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OncallSchedule'
      responses:
        '201':
          description: 创建成功

  /oncall/schedules/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    delete:
      tags:
        - 值班
      summary: 删除值班组（级联删 shifts）
      operationId: deleteOncallSchedule
      responses:
        '204':
          description: 成功

  /oncall/schedules/{id}/shifts:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags:
        - 值班
      summary: 列出 schedule 下所有班次
      operationId: listOncallShifts
      responses:
        '200':
          description: 成功
    post:
      tags:
        - 值班
      summary: 创建班次
      operationId: createOncallShift
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OncallShift'
      responses:
        '201':
          description: 创建成功

  /oncall/shifts/{shift_id}:
    parameters:
      - name: shift_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    delete:
      tags:
        - 值班
      summary: 删除班次
      operationId: deleteOncallShift
      responses:
        '204':
          description: 成功

  /oncall/policies:
    get:
      tags:
        - 升级策略
      summary: 列出升级策略
      operationId: listEscalationPolicies
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EscalationPolicy'
    post:
      tags:
        - 升级策略
      summary: 创建升级策略（含 levels）
      operationId: createEscalationPolicy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EscalationPolicy'
      responses:
        '201':
          description: 创建成功

  /oncall/policies/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags:
        - 升级策略
      summary: 获取单条升级策略
      operationId: getEscalationPolicy
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EscalationPolicy'
    delete:
      tags:
        - 升级策略
      summary: 删除升级策略
      operationId: deleteEscalationPolicy
      responses:
        '204':
          description: 成功

  # ==================== 故障 Runbook（P2-1）====================
  /runbooks:
    get:
      tags:
        - Runbook
      summary: 列出 Runbook
      operationId: listRunbooks
      parameters:
        - name: asset_type
          in: query
          schema: { type: string }
        - name: severity
          in: query
          schema: { type: integer }
        - name: enabled
          in: query
          schema: { type: boolean }
        - name: keyword
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/Runbook' }
                  total: { type: integer }
    post:
      tags: [Runbook]
      summary: 创建 Runbook
      operationId: createRunbook
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Runbook' }
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Runbook' }
        '400': { description: 参数错误 }
  /runbooks/recommend:
    get:
      tags: [Runbook]
      summary: 按告警推荐 Runbook
      operationId: recommendRunbooks
      parameters:
        - name: asset_type
          in: query
          schema: { type: string }
        - name: severity
          in: query
          schema: { type: integer }
      responses:
        '200':
          description: 推荐列表
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Runbook' }
  /runbooks/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Runbook]
      summary: 获取 Runbook
      operationId: getRunbook
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Runbook' }
        '404': { description: 不存在 }
    put:
      tags: [Runbook]
      summary: 更新 Runbook
      operationId: updateRunbook
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Runbook' }
      responses:
        '200': { description: 成功 }
        '400': { description: 参数错误 }
        '404': { description: 不存在 }
    delete:
      tags: [Runbook]
      summary: 删除 Runbook
      operationId: deleteRunbook
      responses:
        '204': { description: 成功 }
        '404': { description: 不存在 }

  # ==================== 指标快照（P2-2）====================
  /metric-snapshots:
    get:
      tags: [指标快照]
      summary: 时序查询
      operationId: queryMetricSnapshots
      parameters:
        - name: asset_id
          in: query
          schema: { type: string, format: uuid }
        - name: key
          in: query
          schema: { type: string }
        - name: from
          in: query
          schema: { type: string, format: date-time }
        - name: to
          in: query
          schema: { type: string, format: date-time }
        - name: limit
          in: query
          schema: { type: integer, default: 1000 }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/MetricSnapshot' }
    post:
      tags: [指标快照]
      summary: 批量插入
      operationId: bulkInsertMetricSnapshots
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items: { $ref: '#/components/schemas/MetricSnapshot' }
      responses:
        '201': { description: 插入成功 }
        '400': { description: 参数错误 }
  /metric-snapshots/latest:
    get:
      tags: [指标快照]
      summary: 取 asset+key 最新 N 个点
      operationId: latestMetricSnapshots
      parameters:
        - name: asset_id
          in: query
          required: true
          schema: { type: string, format: uuid }
        - name: key
          in: query
          required: true
          schema: { type: string }
        - name: n
          in: query
          schema: { type: integer, default: 60 }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/MetricSnapshot' }

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # ==================== 资产诊断 ====================
    TimelineEvent:
      type: object
      properties:
        ts:
          type: string
          format: date-time
        kind:
          type: string
          enum: [alert, ticket, status_change, link_change]
        sub_kind:
          type: string
        severity:
          type: integer
        title:
          type: string
        description:
          type: string
        ref_id:
          type: string
          format: uuid
        ref_table:
          type: string
    DiagnosticAsset:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        asset_tag:
          type: string
        asset_type:
          type: string
        brand:
          type: string
        model:
          type: string
        status:
          type: string
        site_id:
          type: string
          format: uuid
        site_name:
          type: string
        rack_id:
          type: string
          format: uuid
        rack_name:
          type: string
    DiagnosticSummary:
      type: object
      properties:
        alert_count:
          type: integer
        ticket_count:
          type: integer
        open_alerts:
          type: integer
        open_tickets:
          type: integer
        last_offline:
          type: string
          format: date-time
        last_online:
          type: string
          format: date-time
        mttr_seconds:
          type: integer
          nullable: true
        link_down_count:
          type: integer
        window_days:
          type: integer
        window_start:
          type: string
          format: date-time
        window_end:
          type: string
          format: date-time
        asset_id:
          type: string
          format: uuid
    DiagnosticTimeline:
      type: object
      properties:
        asset:
          $ref: '#/components/schemas/DiagnosticAsset'
        events:
          type: array
          items:
            $ref: '#/components/schemas/TimelineEvent'
        summary:
          $ref: '#/components/schemas/DiagnosticSummary'

    # ==================== 告警抑制 ====================
    AlertSuppression:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        severity_max:
          type: integer
        host_pattern:
          type: string
        time_window_seconds:
          type: integer
        ttl_seconds:
          type: integer
        enabled:
          type: boolean
        description:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    SuppressionMatchResult:
      type: object
      properties:
        suppressed:
          type: boolean
        matched_rule:
          type: string
          format: uuid
        reason:
          type: string
        last_fired_at:
          type: string
          format: date-time
        window_expires_at:
          type: string
          format: date-time

    # ==================== 网络拓扑 ====================
    TopologyNode:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        asset_tag:
          type: string
        asset_type:
          type: string
        brand:
          type: string
        status:
          type: string
        open_alerts:
          type: integer
        is_virtual:
          type: boolean
        connected_assets:
          type: integer
        position_x:
          type: number
        position_y:
          type: number
    TopologyEdge:
      type: object
      properties:
        id:
          type: string
          format: uuid
        source:
          type: string
        target:
          type: string
        interface_name:
          type: string
        status:
          type: string
        speed:
          type: integer
        purpose:
          type: string
    TopologyStats:
      type: object
      properties:
        total_nodes:
          type: integer
        total_edges:
          type: integer
        nodes_with_alert:
          type: integer
        down_edges:
          type: integer
        virtual_nodes:
          type: integer
        window_days:
          type: integer
    TopologyGraph:
      type: object
      properties:
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/TopologyNode'
        edges:
          type: array
          items:
            $ref: '#/components/schemas/TopologyEdge'
        stats:
          $ref: '#/components/schemas/TopologyStats'
        generated_at:
          type: string
          format: date-time

    # ==================== 值班 + 升级 ====================
    OncallSchedule:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        timezone:
          type: string
        enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    OncallShift:
      type: object
      properties:
        id:
          type: string
          format: uuid
        schedule_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        user_name:
          type: string
        starts_at:
          type: string
          format: date-time
        ends_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
    OncallCurrent:
      type: object
      properties:
        schedule_id:
          type: string
          format: uuid
        schedule_name:
          type: string
        user_id:
          type: string
          format: uuid
        user_name:
          type: string
        starts_at:
          type: string
          format: date-time
        ends_at:
          type: string
          format: date-time
        shift_id:
          type: string
          format: uuid
    EscalationLevel:
      type: object
      properties:
        id:
          type: string
          format: uuid
        policy_id:
          type: string
          format: uuid
        level:
          type: integer
        target_type:
          type: string
        target_id:
          type: string
        wait_minutes:
          type: integer
        notify_methods:
          type: string
    EscalationPolicy:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        levels:
          type: array
          items:
            $ref: '#/components/schemas/EscalationLevel'

    # ==================== 通用 ====================
    Error:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string

    # ==================== 认证 ====================
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
        password:
          type: string

    LoginResponse:
      type: object
      properties:
        code:
          type: integer
          example: 0
        data:
          type: object
          properties:
            token:
              type: string
            user:
              $ref: '#/components/schemas/User'

    # ==================== 仪表盘 ====================
    DashboardStats:
      type: object
      properties:
        code:
          type: integer
        data:
          type: object
          properties:
            assets:
              type: integer
            alerts:
              type: integer
            tickets:
              type: integer
            sites:
              type: integer
            machines:
              type: integer
            networks:
              type: integer

    DashboardTrends:
      type: object
      properties:
        code:
          type: integer
        data:
          type: object
          properties:
            alert_trends:
              type: array
              items:
                type: object
                properties:
                  date:
                    type: string
                  count:
                    type: integer

    # ==================== 资产 ====================
    Asset:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        asset_type:
          type: string
          enum: [server, switch, router, firewall, storage, other]
        ip_address:
          type: string
        mac_address:
          type: string
        status:
          type: string
          enum: [active, inactive, maintenance]
        site_id:
          type: string
          format: uuid
        site_name:
          type: string
        rack_id:
          type: string
          format: uuid
        rack_name:
          type: string
        rack_position:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AssetInput:
      type: object
      required:
        - name
        - asset_type
        - ip_address
      properties:
        name:
          type: string
        asset_type:
          type: string
        ip_address:
          type: string
        mac_address:
          type: string
        site_id:
          type: string
          format: uuid
        rack_id:
          type: string
          format: uuid
        rack_position:
          type: integer

    AssetList:
      type: object
      properties:
        code:
          type: integer
        data:
          type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/Asset'
            total:
              type: integer
            page:
              type: integer
            page_size:
              type: integer

    # ==================== 告警 ====================
    Alert:
      type: object
      properties:
        id:
          type: string
          format: uuid
        host:
          type: string
        message:
          type: string
        severity:
          type: integer
          minimum: 1
          maximum: 5
        severity_name:
          type: string
        status:
          type: string
          enum: [problem, acknowledged, resolved]
        asset_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        ack_time:
          type: string
          format: date-time
        ack_user:
          type: string
        resolve_time:
          type: string
          format: date-time
        resolve_user:
          type: string
        duration:
          type: integer
        is_false_positive:
          type: boolean
          description: 是否被标记为误报（小改进 #2）
        marked_by:
          type: string
          description: 标记人 username
        marked_at:
          type: string
          format: date-time
        false_positive_note:
          type: string
          description: 误报标记备注

    AlertList:
      type: object
      properties:
        code:
          type: integer
        data:
          type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/Alert'
            stats:
              type: object
              properties:
                total:
                  type: integer
                problem:
                  type: integer
                acknowledged:
                  type: integer
                resolved:
                  type: integer

    AlertStats:
      type: object
      properties:
        code:
          type: integer
        data:
          type: object
          properties:
            by_severity:
              type: array
              items:
                type: object
                properties:
                  severity:
                    type: integer
                  severity_name:
                    type: string
                  count:
                    type: integer
            by_hour:
              type: array
              items:
                type: object
                properties:
                  hour:
                    type: string
                    format: date-time
                  count:
                    type: integer

    AlertRule:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        condition:
          type: string
        threshold:
          type: number
        severity:
          type: integer
        is_enabled:
          type: boolean
        notification_channels:
          type: array
          items:
            type: string

    AlertRuleInput:
      type: object
      required:
        - name
        - condition
        - threshold
        - severity
      properties:
        name:
          type: string
        condition:
          type: string
        threshold:
          type: number
        severity:
          type: integer
        is_enabled:
          type: boolean

    AlertRuleList:
      type: object
      properties:
        code:
          type: integer
        data:
          type: array
          items:
            $ref: '#/components/schemas/AlertRule'

    # ==================== 机房机柜 ====================
    Site:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        location:
          type: string
        is_active:
          type: boolean

    SiteList:
      type: object
      properties:
        code:
          type: integer
        data:
          type: array
          items:
            $ref: '#/components/schemas/Site'

    SiteDetail:
      type: object
      properties:
        code:
          type: integer
        data:
          type: object
          properties:
            site:
              $ref: '#/components/schemas/Site'
            rack_count:
              type: integer
            asset_count:
              type: integer

    Rack:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        site_id:
          type: string
          format: uuid
        total_units:
          type: integer
        used_units:
          type: integer

    RackList:
      type: object
      properties:
        code:
          type: integer
        data:
          type: array
          items:
            $ref: '#/components/schemas/Rack'

    RackDevice:
      allOf:
        - $ref: '#/components/schemas/Asset'
        - type: object
          properties:
            status:
              type: string
              enum: [green, yellow, red]
            alert_count:
              type: integer

    RackDeviceList:
      type: object
      properties:
        code:
          type: integer
        data:
          type: array
          items:
            $ref: '#/components/schemas/RackDevice'

    # ==================== 工单 ====================
    Ticket:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        priority:
          type: string
          enum: [critical, high, normal, low]
        status:
          type: string
          enum: [open, in_progress, pending, resolved, closed]
        requester:
          type: string
        assignee:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TicketInput:
      type: object
      required:
        - title
        - priority
      properties:
        title:
          type: string
        description:
          type: string
        priority:
          type: string

    TicketList:
      type: object
      properties:
        code:
          type: integer
        data:
          type: array
          items:
            $ref: '#/components/schemas/Ticket'

    # ==================== 用户 ====================
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        nickname:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [admin, operator, viewer]
        created_at:
          type: string
          format: date-time

    UserList:
      type: object
      properties:
        code:
          type: integer
        data:
          type: array
          items:
            $ref: '#/components/schemas/User'

    # ==================== 通知渠道 ====================
    NotificationChannel:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        type:
          type: string
          enum: [email, dingtalk, wechat, webhook]
        config:
          type: object
        is_enabled:
          type: boolean

    ChannelInput:
      type: object
      required:
        - name
        - type
      properties:
        name:
          type: string
        type:
          type: string
        config:
          type: object

    ChannelList:
      type: object
      properties:
        code:
          type: integer
        data:
          type: array
          items:
            $ref: '#/components/schemas/NotificationChannel'

    Runbook:
      type: object
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        asset_type: { type: string }
        summary: { type: string }
        content_md: { type: string }
        steps: { type: string, description: "JSON 步骤数组" }
        tags: { type: string }
        severity: { type: integer, description: "0=不限制; 1-5=对应告警严重度" }
        enabled: { type: boolean }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    MetricSnapshot:
      type: object
      properties:
        id: { type: string, format: uuid }
        asset_id: { type: string, format: uuid }
        key: { type: string }
        value: { type: number, format: double }
        ts: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
